<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h1>Criar Conta 🎉</h1>
      <p>Junte-se à comunidade BINGO</p>
    </div>

    <div *ngIf="error" class="alert alert-error">
      {{ error }}
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="nome">Nome Completo</label>
        <input
          type="text"
          id="nome"
          formControlName="nome"
          placeholder="Seu nome"
          [class.is-invalid]="submitted && f['nome'].errors"
        />
        <div *ngIf="submitted && f['nome'].errors" class="error-text">
          <span *ngIf="f['nome'].errors['required']">Nome é obrigatório</span>
          <span *ngIf="f['nome'].errors['minlength']">Nome deve ter no mínimo 3 caracteres</span>
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          placeholder="seu@email.com"
          [class.is-invalid]="submitted && f['email'].errors"
        />
        <div *ngIf="submitted && f['email'].errors" class="error-text">
          <span *ngIf="f['email'].errors['required']">Email é obrigatório</span>
          <span *ngIf="f['email'].errors['email']">Email inválido</span>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <input
          type="password"
          id="password"
          formControlName="password"
          placeholder="••••••••"
          [class.is-invalid]="submitted && f['password'].errors"
        />
        <div *ngIf="submitted && f['password'].errors" class="error-text">
          <span *ngIf="f['password'].errors['required']">Senha é obrigatória</span>
          <span *ngIf="f['password'].errors['minlength']">Senha deve ter no mínimo 6 caracteres</span>
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirmar Senha</label>
        <input
          type="password"
          id="confirmPassword"
          formControlName="confirmPassword"
          placeholder="••••••••"
          [class.is-invalid]="submitted && (f['confirmPassword'].errors || registerForm.errors)"
        />
        <div *ngIf="submitted && (f['confirmPassword'].errors || registerForm.get('confirmPassword')?.hasError('passwordMismatch'))" class="error-text">
          <span *ngIf="f['confirmPassword'].errors && f['confirmPassword'].errors['required']">Confirmação de senha é obrigatória</span>
          <span *ngIf="registerForm.errors?.['passwordMismatch']">As senhas não coincidem</span>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-lg" [disabled]="loading">
        <span *ngIf="!loading">Criar Conta</span>
        <span *ngIf="loading">Criando conta...</span>
      </button>
    </form>

    <div class="auth-footer">
      <p>Já tem conta? <a routerLink="/auth/login">Faça login aqui</a></p>
    </div>
  </div>

  <div class="auth-image">
    <div class="decoration">
      <div class="circle circle-1"></div>
      <div class="circle circle-2"></div>
      <div class="circle circle-3"></div>
    </div>
  </div>
</div>
